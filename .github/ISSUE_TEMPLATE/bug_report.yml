name: Bug Report
description: Report a bug in denex-network-manager
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create localnet.yaml with ...
        2. Run `dnm start`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Full error message or stack trace, if any.
      render: shell

  - type: textarea
    id: status
    attributes:
      label: dnm status output
      description: Output of `dnm status` if the localnet started at all.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: localnet.yaml
      description: Your localnet.yaml (sanitize any secrets — default admin/admin credentials are fine to share).
      render: yaml

  - type: input
    id: dnm-version
    attributes:
      label: denex-network-manager version
      placeholder: 'e.g. 0.1.0-beta.1'
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Deno (CLI)
        - Node.js (SDK)
        - Bun (SDK)
        - npm global install
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: 'e.g. Deno 2.1.0 / Node.js 20.11.0'

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      placeholder: 'e.g. Docker 26.1.3'

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (arm64)
        - Windows (x64)
